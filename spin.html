<!DOCTYPE html>
<html lang="en">

<head>

</p>

<div id="wheel" class="wheel">

<div class="center-circle">
SPIN
</div>

</div>

</div>

<h3>🎉 Possible Rewards</h3>

<p>₹2</p>

<p>₹5</p>
