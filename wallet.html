<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskEarn Wallet</title>

<link rel="stylesheet" href="css/wallet.css">

</head>
<body>

<header class="topbar">

<div>

<h2>💰 My Wallet</h2>

<p>Your earnings at a glance</p>

</div>

<a href="dashboard.html" class="home-btn">🏠 Dashboard</a>

</header>

<div class="container">

<!-- Wallet Balance -->

<div class="wallet-card">

<h3>Available Balance</h3>

<h1 id="walletBalance">₹0.00</h1>

<p>Ready to withdraw</p>

</div>

<!-- Wallet Stats -->

<div class="stats-grid">

<div class="stat-card">

<h4>💸 Total Earned</h4>

<h2 id="totalEarned">₹0.00</h2>

</div>

<div class="stat-card">

<h4>🏦 Total Withdrawn</h4>

<h2 id="totalWithdraw">₹0.00</h2>

</div>

</div>

<!-- Quick Actions -->

<div class="action-card">

<h3>⚡ Quick Action</h3>

<button onclick="window.location.href='withdraw.html'">
💸 Withdraw Money
</button>

</div>

<!-- Recent Activity -->

<div class="history-card">

<h3>📜 Recent Activity</h3>

<p>No recent transactions.</p>

</div>

</div>

<!-- Bottom Navigation -->

<nav class="bottom-nav">

<a href="dashboard.html">
🏠
<span>Home</span>
</a>

<a href="tasks.html">
📋
<span>Tasks</span>
</a>

<a href="wallet.html" class="active">
💰
<span>Wallet</span>
</a>

<a href="profile.html">
👤
<span>Profile</span>
</a>

</nav>

<script type="module" src="js/wallet.js"></script>

</body>
</html>
