<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Task Verification</title>

<link rel="stylesheet" href="css/verify-task.css">

</head>

<body>

<header class="topbar">

<h2>✅ Verify Task</h2>

<a href="tasks.html">⬅ Back</a>

</header>

<div class="container">

<div class="verify-card">

<h2 id="taskTitle">

Loading Task...

</h2>

<p id="taskDescription">

Please complete the task before verification.

</p>

<h1 id="timer">

30

</h1>

<p>

⏳ Wait until the timer finishes.

</p>

<div class="progress">

<div
id="progressFill"
class="progress-fill">

</div>

</div>

<button
id="verifyBtn"
disabled>

✅ Verify Task

</button>

</div>

</div>

<script type="module" src="js/verify-task.js"></script>

</body>

</html>
